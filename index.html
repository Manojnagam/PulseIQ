body{background:var(--bg);color:var(--text)}
select option{background:#1f2937;color:#f3f4f6}
input::placeholder,textarea::placeholder{color:var(--muted)}
.nav-lbl{color:rgba(255,255,255,.5)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background-color:var(--bg);background-image:radial-gradient(circle at top left, rgba(0, 230, 118, 0.05), transparent 45%), radial-gradient(circle at bottom right, rgba(255, 214, 0, 0.03), transparent 50%), radial-gradient(circle at top right, rgba(255, 23, 68, 0.02), transparent 45%);background-attachment:fixed;color:var(--text);min-height:100vh;font-size:14px;transition:background-color .3s, color .3s}
/* SETUP */
#setup{min-height:100vh;display:flex;align-items:stretch;justify-content:center;background:var(--bg);color:var(--text)}
.setup-split{display:flex;width:100%;min-height:100vh}
.setup-left{flex:1;background:linear-gradient(160deg,#090d16 0%,#0f172a 45%,#1e293b 100%);display:flex;flex-direction:column;justify-content:center;padding:60px 56px;position:relative;overflow:hidden}
.setup-left::before{content:'';position:absolute;top:-80px;right:-80px;width:360px;height:360px;background:rgba(255,255,255,.04);border-radius:50%}
.setup-left::after{content:'';position:absolute;bottom:-60px;left:-60px;width:280px;height:280px;background:rgba(232,168,56,.06);border-radius:50%}
.setup-brand{display:flex;align-items:center;gap:14px;margin-bottom:48px}
.setup-brand-icon{width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid rgba(255,255,255,.15)}
.setup-brand-name{font-family:'DM Serif Display',serif;font-size:22px;color:#fff}
.setup-brand-tag{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px;font-weight:600;letter-spacing:.5px}
.setup-hero-h{font-family:'DM Serif Display',serif;font-size:34px;line-height:1.25;color:#fff;margin-bottom:14px}
.setup-hero-h em{font-style:italic;color:var(--accent)}
.setup-hero-p{font-size:14px;color:rgba(255,255,255,.6);line-height:1.75;margin-bottom:40px;max-width:360px}
.setup-feats{display:flex;flex-direction:column;gap:12px}
.setup-feat{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.75)}
.setup-feat-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.setup-right{width:480px;display:flex;align-items:center;justify-content:center;padding:48px 40px;background:var(--bg)}
.card{background:var(--surface);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-radius:20px;width:100%;max-width:400px;padding:30px;box-shadow:var(--shadow-md);border:1px solid var(--border);transition:transform .3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow .3s ease}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.logo{font-family:'DM Serif Display',serif;font-size:26px;color:var(--primary);margin-bottom:4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:32px;line-height:1.6}
.card label{display:block;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px;margin-top:18px}
.card input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;color:var(--text);transition:border-color .18s,box-shadow .18s,background-color .18s;background:var(--input-bg)}
.card input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,58,40,.08);background:var(--input-focus-bg)}
.hint{font-size:11px;color:var(--muted);margin-top:4px}
.setup-btn{width:100%;margin-top:28px;padding:15px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.2px;transition:all .2s;box-shadow:0 4px 14px rgba(26,58,40,.3)}
.setup-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,58,40,.4)}
.setup-btn:active{transform:translateY(0) scale(0.97)}
.err{color:var(--danger);font-size:12px;margin-top:8px;display:none;font-weight:600}
.sql-hint{margin-top:22px;padding:14px 16px;background:var(--success-light);border-radius:10px;font-size:12px;color:#14532d;line-height:1.8;border:1px solid #bbf7d0}
@media(max-width:860px){.setup-split{flex-direction:column}.setup-left{padding:40px 28px;min-height:auto}.setup-left::before,.setup-left::after{display:none}.setup-hero-h{font-size:26px}.setup-right{width:100%;padding:32px 22px}.card{max-width:100%}}
/* APP */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--sidebar-bg);display:flex;flex-direction:column;z-index:100;overflow-y:auto;transition:transform .3s;box-shadow:2px 0 20px rgba(0,0,0,.18)}
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo-inner{display:flex;align-items:center;gap:10px;min-width:0}
.sb-logo-inner>div:last-child{min-width:0;overflow:hidden}
.sb-logo-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid rgba(255,255,255,.14);flex-shrink:0}
.sb-logo h1{font-family:'DM Serif Display',serif;color:#fff;font-size:17px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-logo span{color:rgba(255,255,255,.4);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;display:block;margin-top:1px}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto;min-height:0}
.nav-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.35);padding:10px 10px 3px;font-weight:700;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between}
.nav-lbl:hover{color:rgba(255,255,255,.6)}
.nav-arrow{font-size:10px;transition:transform .2s;display:inline-block}
.nav-lbl.collapsed .nav-arrow{transform:rotate(-90deg)}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:9px;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;font-weight:500;font-size:13px;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.09);color:#fff}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.nav-item .ic{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-center-switch{padding:10px 12px;border-top:1px solid rgba(255,255,255,.08)}
.sb-center-switch label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.4);font-weight:700;display:block;margin-bottom:5px}
.sb-center-switch select{width:100%;padding:7px 9px;border-radius:9px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#fff;font-family:inherit;font-size:12px;cursor:pointer;appearance:auto}
.sb-center-switch select option{color:var(--text);background:var(--surface)}
.sb-foot{padding:10px 12px;border-top:1px solid rgba(255,255,255,.08)}
.disc-btn{flex:1;padding:8px 4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:rgba(255,255,255,.6);font-size:15px;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
.disc-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.sb-foot-row{display:flex;gap:6px}
.main{margin-left:var(--sw);min-height:100vh;padding:28px 30px}
.menu-btn{display:none;position:fixed;top:13px;left:13px;z-index:200;background:var(--primary);border:none;border-radius:9px;padding:7px 10px;cursor:pointer;color:#fff;font-size:17px;box-shadow:0 2px 8px rgba(26,58,40,.35)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
/* PAGE */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.pt{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text)}
.ps{color:var(--muted);font-size:13px;margin-top:3px}
.btn-p{padding:10px 20px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:.1px;box-shadow:0 2px 8px rgba(26,58,40,.25)}
.btn-p:hover{background:linear-gradient(135deg,var(--primary-light),var(--primary))}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--surface);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-l{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
.stat-v{font-family:'DM Serif Display',serif;font-size:30px;color:var(--primary);margin-top:4px}
/* ── VISION CARD ── */

/* OVERVIEW DASHBOARD */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.ov-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.ov-grid,.ov-grid-3{grid-template-columns:1fr}}
.ov-card{background:var(--surface);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.ov-card-h{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--surface2)}
.ov-card-h h3{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text);display:flex;align-items:center;gap:8px}
.ov-card-h .ov-count{font-size:12px;background:var(--surface2);color:var(--muted);padding:2px 8px;border-radius:10px;font-weight:600;font-family:'DM Sans',sans-serif}
.ov-card-body{padding:14px 18px;max-height:280px;overflow-y:auto}
.ov-card-body::-webkit-scrollbar{width:4px}
.ov-card-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.ov-empty{text-align:center;padding:24px;color:var(--muted);font-size:13px}
.ov-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--surface2);gap:10px}
.ov-row:last-child{border-bottom:none}
.ov-row-info{flex:1;min-width:0}
.ov-row-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-row-sub{font-size:11px;color:var(--muted);margin-top:1px}
.ov-row-actions{display:flex;gap:5px;flex-shrink:0}
.ov-quick{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.ov-quick-btn{padding:10px 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:7px;transition:all .18s;box-shadow:var(--shadow)}
.ov-quick-btn:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-1px);box-shadow:0 4px 14px rgba(45,90,61,.12)}
/* Mini bar chart */
.ov-bars{display:flex;align-items:flex-end;gap:6px;height:80px;padding:10px 0}
.ov-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.ov-bar{width:100%;border-radius:4px 4px 0 0;background:var(--primary);min-height:2px;transition:height .4s ease}
.ov-bar-lbl{font-size:10px;color:var(--muted);font-weight:600}
.ov-bar-val{font-size:10px;color:var(--primary);font-weight:700}
/* Stat icon */
.stat-ic{font-size:22px;margin-bottom:4px}
/* Revenue mini cards */
.ov-rev-row{display:flex;gap:10px;margin-bottom:10px}
.ov-rev-card{flex:1;padding:14px;border-radius:10px;text-align:center}
.ov-rev-card.inc{background:var(--success-light);border:1px solid var(--border-success)}
.ov-rev-card.exp{background:var(--danger-light);border:1px solid var(--border-danger)}
.ov-rev-card.net{background:var(--accent-light);border:1px solid var(--border-accent)}
.ov-rev-card .ov-rev-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.ov-rev-card .ov-rev-val{font-family:'DM Serif Display',serif;font-size:22px;margin-top:4px}
.ov-rev-card.inc .ov-rev-val{color:var(--text-success)}
.ov-rev-card.exp .ov-rev-val{color:var(--text-danger)}
.ov-rev-card.net .ov-rev-val{color:var(--text-accent)}
.ov-link{font-size:12px;color:var(--primary);cursor:pointer;font-weight:600;text-decoration:none}
.ov-link:hover{text-decoration:underline}
/* PIN TRACKER */
.pin-progress{background:var(--surface2);border-radius:20px;height:24px;overflow:hidden;position:relative}
.pin-fill{height:100%;border-radius:20px;transition:width .6s ease;position:relative}
.pin-fill-label{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:#fff}
.pin-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:20px;margin-bottom:16px}
.pin-card h3{font-family:'DM Serif Display',serif;font-size:17px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pin-metric{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.pin-metric-label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.pin-metric-val{font-family:'DM Serif Display',serif;font-size:22px}
.pin-gap{background:var(--accent-light);border:1px solid var(--border-accent);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text-accent);margin-top:10px}
.pin-fl-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--surface2)}
.pin-fl-row:last-child{border-bottom:none}
.pin-center-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--surface2);gap:10px}
.pin-center-row:last-child{border-bottom:none}
.pin-action{background:var(--success-light);border:1px solid var(--border-success);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--text);margin-top:10px;line-height:1.6}
/* TABLE */
.tcard{background:var(--surface);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.ttoolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-wrap:wrap;background:var(--toolbar-bg)}
.search{padding:8px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:13px;flex:1;min-width:160px;color:var(--text);background:var(--input-bg);transition:border-color .18s,box-shadow .18s}
.search:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,58,40,.07);background:var(--input-focus-bg)}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--surface2);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--hover-bg)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.ref-item:hover{background:var(--accent);color:#fff}
.bg{background:var(--success-light);color:var(--text-success)}
.by{background:var(--warning-light);color:var(--warning-text)}
.br{background:var(--danger-light);color:var(--text-danger)}
.bb{background:var(--info-light);color:var(--info-text)}
.acts{display:flex;gap:5px}
.btn-e,.btn-d{padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-e{background:var(--info-light);color:var(--info-text)}
.btn-e:hover{background:var(--border)}
.btn-d{background:var(--danger-light);color:var(--text-danger)}
.btn-d:hover{background:var(--border)}
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .ei{font-size:38px;margin-bottom:10px}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:20px 14px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .22s;-webkit-overflow-scrolling:touch}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:520px;margin:auto;transform:translateY(16px);transition:transform .22s;box-shadow:0 24px 64px rgba(0,0,0,.2),0 2px 12px rgba(0,0,0,.06);flex-shrink:0}
.overlay.open .modal{transform:translateY(0)}
.mh{padding:22px 24px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mt{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text)}
.mc{width:32px;height:32px;border-radius:9px;border:none;background:var(--surface2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.mc:hover{background:var(--border);color:var(--text)}
.mb{padding:20px 24px 24px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:13px;color:var(--text);background:var(--input-bg);transition:border-color .18s,box-shadow .18s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary);background:var(--input-focus-bg);box-shadow:0 0 0 3px rgba(26,58,40,.07)}
.fg textarea{resize:vertical;min-height:70px}
.mf{display:flex;gap:9px;justify-content:flex-end;padding:6px 24px 20px}
.btn-c{padding:10px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
.btn-c:hover{background:var(--border);color:var(--text)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(10px);transition:all .28s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--danger);color:#fff}
/* SECTIONS */
.sec{display:none}.sec.active{display:block}
/* SQL BOX */
pre.sqlbox{background:#1a2e1f;color:#a8d8b4;padding:22px;border-radius:12px;font-size:11px;overflow-x:auto;line-height:1.7;white-space:pre-wrap}
/* CUSTOM EXTRAS */
.att-grid{overflow-x:auto;overflow-y:auto;max-height:72vh;margin-top:20px;border-radius:8px}
.att-grid table{width:max-content;min-width:100%;border-collapse:collapse}
.att-grid thead th{position:sticky;top:0;background:var(--surface2);z-index:3}
.att-grid thead th:first-child{z-index:4}
.att-cell{text-align:center;cursor:pointer;padding:6px 4px;font-size:11px;user-select:none}
.att-cell.p{background:var(--success-light);color:var(--success);font-weight:600}
.att-cell.a{background:var(--danger-light);color:var(--danger)}
.att-cell.c{background:var(--accent-light);color:var(--text-accent);font-weight:600}
.att-cell:hover{filter:brightness(0.95)}
.alert-row td{background:var(--alert-bg)}
.arr{font-size:11px;margin-left:3px}
.tabs{display:flex;gap:10px;margin-bottom:16px}
.tab-btn{padding:8px 16px;background:var(--surface2);border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
.tab-btn.active{background:var(--primary);color:#fff}
/* ATT CARDS */
.att-list-panel { border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
.att-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; animation: pop-in 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
.att-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.06); border-color: var(--primary); }
.att-card-name { font-weight: 600; font-size: 14.5px; }
@keyframes pop-in { 0% { transform: scale(0.90) translateY(10px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
/* FINANCE */
.income-row td:first-child{border-left:3px solid var(--success)}
.expense-row td:first-child{border-left:3px solid var(--danger)}
/* RETENTION */
.milestone-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin:2px}
.ms-gold{background:#fff8e1;color:#b07800;border:1px solid #f9c74f}
.ms-green{background:var(--success-light);color:var(--success);border:1px solid #82c99a}
.ms-blue{background:#edf3ff;color:#2b5ce6;border:1px solid #bfcfff}
.wa-btn{background:#25D366;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
.wa-btn:hover{background:#1da851}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-top:20px}
.agent-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;transition:border-color .2s}
.agent-card:hover{border-color:var(--primary)}
.agent-icon{font-size:34px;line-height:1}
.agent-name{font-family:'DM Serif Display',serif;font-size:15px;color:var(--text);margin:0}
.agent-desc{font-size:12px;color:var(--muted);line-height:1.6;flex:1}
.agent-run-btn{margin-top:6px;background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;width:100%}
.agent-run-btn:hover{opacity:.88}
.agent-run-btn:disabled{opacity:.45;cursor:not-allowed}
.retention-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.star-cust{color:#f9c74f;font-size:13px;font-weight:700}
@media(max-width:768px){.retention-card{flex-direction:column;align-items:flex-start}}

.inv-drop{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;max-height:240px;overflow-y:auto;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.13);display:none;margin-top:2px}
.inv-drop-cat{padding:5px 12px;background:var(--surface2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0}
.inv-drop-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--surface2);color:var(--text)}
.inv-drop-item:hover{background:var(--accent-light);color:var(--primary)}
.inv-stock-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.inv-stock-card.low{border-left:3px solid var(--accent)}
.inv-stock-card.out{border-left:3px solid var(--danger)}
.inv-usage-card{background:var(--surface2);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.inv-usage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:10px}
.inv-usage-stat{background:var(--surface);border-radius:8px;padding:10px 12px;text-align:center}
.inv-usage-stat-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.inv-usage-stat-val{font-family:'DM Serif Display',serif;font-size:22px;color:var(--primary);margin-top:2px}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay.open{display:block}
  .main{margin-left:0;padding:60px 14px 20px}
  .menu-btn{display:block}
  .sb-logo h1{font-size:13px}
  .fr{grid-template-columns:1fr}
  .ph{flex-direction:column;align-items:flex-start}
  #sec-profile [style*="grid-template-columns:1fr 1fr 1fr"]{grid-template-columns:1fr!important}
}

/* ── SLICERS ── */
.slicer-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;box-shadow:var(--shadow)}
.slicer-bar-inner{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.slicer-group{display:flex;flex-direction:column;gap:4px;min-width:130px}
.slicer-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.slicer-select,.slicer-input{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;color:var(--text);background:var(--input-bg);cursor:pointer}
.slicer-select:focus,.slicer-input:focus{outline:none;border-color:var(--primary);background:var(--input-focus-bg)}
.slicer-chip-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.slicer-chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .15s;white-space:nowrap}
.slicer-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.slicer-chip:hover:not(.active){background:var(--accent-light);border-color:var(--accent);color:var(--text)}
.slicer-reset{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--danger);background:var(--danger-light);color:var(--danger);font-family:inherit}
.slicer-reset:hover{background:var(--danger);color:#fff}
/* ── BODY COMPOSITION ── */
.body-profile{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:var(--radius);padding:18px 22px;color:#fff}
.body-profile-name{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}
.body-profile-meta{font-size:12px;opacity:.8;margin-bottom:12px}
.body-profile-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px}
.body-profile-stat{background:rgba(255,255,255,.12);border-radius:8px;padding:10px 12px;text-align:center}
.body-profile-stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;opacity:.75;font-weight:600}
.body-profile-stat-val{font-family:'DM Serif Display',serif;font-size:20px;margin-top:2px}
.body-profile-stat-diff{font-size:10px;margin-top:2px;font-weight:700}
.recheck-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:var(--shadow)}
.recheck-card.overdue{border-left:4px solid var(--danger)}
.recheck-card.due-soon{border-left:4px solid var(--accent)}
.recheck-days{font-family:'DM Serif Display',serif;font-size:22px}
/* ── LOYALTY & PACK HISTORY ── */
.loyalty-banner{border-radius:var(--radius);padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.loyalty-gold{background:linear-gradient(135deg,#b8860b,#f9c74f,#b8860b);color:#fff}
.loyalty-green{background:linear-gradient(135deg,#2d5a3d,#3d7a52);color:#fff}
.loyalty-blue{background:linear-gradient(135deg,#1e3a8a,#2b5ce6);color:#fff}
.loyalty-purple{background:linear-gradient(135deg,#581c87,#9333ea);color:#fff}
.loyalty-label{font-family:'DM Serif Display',serif;font-size:18px}
.loyalty-sub{font-size:11px;opacity:.85;margin-top:2px}
.pack-timeline{position:relative;padding-left:28px;margin-top:4px}
.pack-timeline::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:var(--border)}
.pack-dot{position:absolute;left:0;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.pack-dot.active{background:var(--success)}.pack-dot.completed{background:var(--primary)}.pack-dot.first{background:var(--accent)}
.pack-item{margin-bottom:16px;position:relative}
.pack-card{background:var(--surface2);border-radius:8px;padding:10px 14px;margin-left:8px;border:1px solid var(--border)}
.pack-card.active-pack{border-color:var(--success);background:var(--success-light)}
/* ── ORG TREE ── */
.org-node{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;display:inline-block;min-width:140px;text-align:center;box-shadow:var(--shadow)}
.org-node.root{border-color:var(--primary);background:var(--primary);color:#fff}
.org-node.l1{border-color:var(--accent)}.org-node.l2{border-color:#8b5cf6}
.org-line{display:flex;justify-content:center;gap:20px;padding-top:20px;position:relative}
.org-line::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:20px;background:var(--border)}
.org-child{display:flex;flex-direction:column;align-items:center;position:relative}
.org-child::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:20px;background:var(--border)}
/* ── COUPONS ── */
.coupon-card{background:linear-gradient(135deg,#f9c74f,#f8961e);border-radius:12px;padding:14px 18px;color:#fff;box-shadow:0 4px 12px rgba(249,199,79,.3)}
.coupon-val{font-family:'DM Serif Display',serif;font-size:36px}
.coupon-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.2);font-size:13px}
/* ── PAYMENTS ── */
.payment-bar{height:8px;border-radius:20px;background:var(--surface2);overflow:hidden;margin:6px 0}
.payment-fill{height:100%;border-radius:20px;background:var(--success);transition:width .5s}
.payment-fill.overdue{background:var(--danger)}
@media(max-width:768px){.slicer-group{min-width:calc(50% - 8px)}}
/* ── HOW TO USE GUIDE ── */
.guide-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.guide-card-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.guide-card-header:hover{background:var(--surface2)}
.guide-card-icon{font-size:22px;width:36px;text-align:center}
.guide-card-title{font-family:'DM Serif Display',serif;font-size:16px;flex:1}
.guide-card-arrow{font-size:12px;color:var(--muted);transition:transform .2s}
.guide-card.open .guide-card-arrow{transform:rotate(90deg)}
.guide-card-body{display:none;padding:0 18px 18px 66px;font-size:13px;line-height:1.8;color:var(--text)}
.guide-card.open .guide-card-body{display:block}
.guide-step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.guide-step-num{background:var(--primary);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.guide-tip{background:var(--accent-light);border-left:3px solid var(--accent);border-radius:6px;padding:10px 13px;margin-top:10px;font-size:12px;color:#7a5a00}
@keyframes pulseRed{0%,100%{box-shadow:0 4px 14px rgba(192,57,43,.35)}50%{box-shadow:0 4px 22px rgba(192,57,43,.7)}}
/* ── LEADS ── */
.lead-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;transition:box-shadow .18s}
.lead-card:hover{box-shadow:0 4px 16px rgba(45,90,61,.12)}
.lead-card.due-today{border-left:4px solid var(--accent)}
.lead-card.overdue{border-left:4px solid var(--danger)}
.lead-card.joined{border-left:4px solid var(--success);opacity:.8}
.lead-avatar{width:38px;height:38px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.lead-info{flex:1;min-width:0}
.lead-name{font-weight:700;font-size:14px;margin-bottom:2px}
.lead-mobile{font-size:12px;color:var(--muted)}
.lead-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;align-items:center}
.lead-next{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600}
.lead-next.today{background:var(--warning-light);color:var(--warning-text)}
.lead-next.overdue{background:var(--danger-light);color:var(--text-danger)}
.lead-next.future{background:var(--success-light);color:var(--text-success)}
.lead-next.none{background:var(--surface2);color:var(--muted)}
.lead-acts{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.lead-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.lead-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
.lead-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.lead-status-new{background:var(--info-light);color:var(--info-text)}
.lead-status-contacted{background:var(--warning-light);color:var(--warning-text)}
.lead-status-interested{background:var(--success-light);color:var(--text-success)}
.lead-status-notinterested{background:var(--danger-light);color:var(--text-danger)}
.lead-status-joined{background:var(--accent-light);color:var(--text-accent)}
.fu-item{padding:10px 12px;border-bottom:1px solid var(--surface2);font-size:13px}
.fu-item:last-child{border-bottom:none}
.fu-date{font-weight:700;color:var(--primary);margin-bottom:2px}
.fu-note{color:var(--muted);font-size:12px}

/* ── EXPENSE TRACKER ── */
.exp-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.exp-row:last-child{border-bottom:none}
.exp-cat-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;background:var(--danger-light);color:var(--danger)}

/* ── COACH PERFORMANCE ── */
.cp-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.cp-row:last-child{border-bottom:none}
.cp-header{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.cp-bar-wrap{background:var(--surface2);border-radius:20px;height:6px;overflow:hidden;margin-top:4px}
.cp-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--primary),var(--primary-light))}

/* ── GOAL SETTING ── */
.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.goal-progress-wrap{background:var(--surface2);border-radius:20px;height:12px;overflow:hidden;margin:10px 0 6px}
.goal-progress-fill{height:100%;border-radius:20px;transition:width .6s ease}
.goal-footer{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}

/* ── NOTIFICATIONS ── */
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.notif-item:last-child{border-bottom:none}
.notif-icon{font-size:20px;flex-shrink:0;width:30px;text-align:center}
.notif-body{flex:1;min-width:0}
.notif-title{font-weight:700;font-size:13px}
.notif-sub{font-size:12px;color:var(--muted);margin-top:2px}
.notif-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.notif-critical{background:var(--danger-light);color:var(--text-danger)}
.notif-warning{background:var(--warning-light);color:var(--warning-text)}
.notif-info{background:var(--info-light);color:var(--info-text)}

/* ── CONTESTS ── */
.contest-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:all .2s}
.contest-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(45,90,61,.14);border-color:var(--primary)}
.contest-card-banner{padding:16px 18px;color:#fff;position:relative;overflow:hidden}
.contest-card-banner::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,.08);border-radius:50%}
.contest-card-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;opacity:.8;margin-bottom:4px}
.contest-card-name{font-size:16px;font-weight:700;line-height:1.3}
.contest-card-prize{font-size:13px;margin-top:6px;opacity:.9}
.contest-card-body{padding:14px 18px}
.contest-days-bar{height:6px;background:var(--surface2);border-radius:10px;overflow:hidden;margin:8px 0}
.contest-days-fill{height:100%;border-radius:10px;transition:width .6s ease}
.contest-meta-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}
.contest-rank-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--surface2)}
.contest-rank-row:last-child{border-bottom:none}
.contest-rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.contest-rank-1{background:linear-gradient(135deg,#f9c74f,#f8961e);color:#fff}
.contest-rank-2{background:linear-gradient(135deg,#b0b0b0,#888);color:#fff}
.contest-rank-3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff}
.contest-rank-n{background:var(--surface2);color:var(--muted)}
.contest-type-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);transition:all .18s}
.contest-type-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.contest-type-chip:hover{border-color:var(--primary);color:var(--primary)}
.contest-completed-row{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;cursor:pointer;transition:all .2s}
.contest-completed-row:hover{border-color:var(--primary);box-shadow:0 2px 10px rgba(45,90,61,.08)}
.contest-detail-tab{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .18s}
.contest-detail-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.contest-detail-tab:hover:not(.active){border-color:var(--primary);color:var(--primary)}
.btp-subtab{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .18s}
.btp-subtab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.btp-subtab:hover:not(.active){border-color:var(--primary);color:var(--primary)}
/* Tracker table */
.tracker-wrap{overflow-x:auto}
.tracker-tbl{width:100%;border-collapse:collapse;min-width:700px}
.tracker-tbl th{background:var(--surface2);padding:10px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;white-space:nowrap;text-align:center}
.tracker-tbl th:first-child{text-align:left}
.tracker-tbl td{padding:10px 12px;border-bottom:1px solid var(--surface2);font-size:13px;vertical-align:middle;text-align:center}
.tracker-tbl td:first-child{text-align:left;font-weight:600}
.tracker-tbl tr:last-child td{border-bottom:none}
.tracker-tbl tr:nth-child(even) td{background:var(--zebra-bg)}
.tracker-tbl tr:hover td{background:var(--hover-bg)!important}
.tracker-toggle{width:32px;height:32px;border-radius:8px;border:2px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:inline-flex;align-items:center;justify-content:center;transition:all .18s;user-select:none}
.tracker-toggle.on{background:var(--success-light);border-color:var(--success);color:var(--success)}
.tracker-toggle.warn{background:var(--warning-light);border-color:var(--border-accent);color:var(--warning-text)}
.tracker-toggle:hover{transform:scale(1.12)}
.tracker-summary-bar{display:flex;gap:12px;flex-wrap:wrap;padding:12px 0;margin-bottom:12px;border-bottom:1px solid var(--surface2)}
.tracker-summary-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}
.senior-send-btn{padding:8px 18px;border-radius:8px;border:2px solid;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s}
.senior-send-btn.pending{background:var(--warning-light);border-color:var(--border-accent);color:var(--warning-text)}
.senior-send-btn.done{background:var(--success-light);border-color:var(--success);color:#065f46;cursor:default}

/* ════════════════════════════════════════
   GLOBAL UI POLISH
   ════════════════════════════════════════ */

/* Section entrance animation */
.sec.active{animation:secIn .26s ease both}
@keyframes secIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Page title accent */
.pt{position:relative;padding-bottom:10px}
.pt::after{content:'';display:block;width:32px;height:3px;background:linear-gradient(90deg,var(--accent),var(--primary-light));border-radius:2px;margin-top:6px}

/* Stat cards — accent top strip + hover lift */
.stat{border-top:3px solid var(--primary);transition:transform .3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow .3s ease, border-color .3s ease}
.stat:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--primary-light)}

/* Cards */
.tcard{transition:transform .3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow .3s ease, border-color .3s ease}
.tcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--primary-light)}
.pin-card{transition:transform .3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow .3s ease}
.pin-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}

/* Overview cards */
.ov-card{transition:transform .3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow .3s ease, border-color .3s ease}
.ov-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--primary-light)}
.ov-card-h{border-bottom:1px solid var(--border)}
.ov-quick-btn{transition:all .18s}

/* Buttons — lift + shadow on hover */
.btn-p{transition:all .18s!important}
.btn-p:hover{transform:translateY(-2px)!important;box-shadow:0 6px 18px rgba(26,58,40,.35)!important;filter:brightness(1.05)!important}
.btn-p:active{transform:translateY(0)!important;box-shadow:0 1px 4px rgba(26,58,40,.2)!important}

/* Form inputs — focus glow */
.fg input,.fg select,.fg textarea,.fr input,.fr select{transition:border-color .18s,box-shadow .18s}
.fg input:focus,.fg select:focus,.fg textarea:focus,.fr input:focus,.fr select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,58,40,.08)}
.search:focus{box-shadow:0 0 0 3px rgba(26,58,40,.08)}

/* Nav active indicator */
.nav-item{position:relative}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:0 3px 3px 0}

/* Table — alternating rows + hover */
tbody tr:nth-child(even) td{background:var(--zebra-bg)}
tbody tr:hover td{background:var(--hover-active-bg)!important;transition:background .12s}

/* Scrollbar polish */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-thumb-hover)}

/* Badge micro-polish */
.badge{transition:all .15s}
.bg{box-shadow:0 1px 4px rgba(22,163,74,.15)}
.br{box-shadow:0 1px 4px rgba(220,38,38,.15)}
.by{box-shadow:0 1px 4px rgba(146,64,14,.1)}
.bb{box-shadow:0 1px 4px rgba(29,78,216,.12)}

/* Empty state icon bounce */
.empty .ei,.ov-empty-icon{animation:iconBounce 2.4s ease-in-out infinite}
@keyframes iconBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* Smooth modal entrance */
.overlay.open .modal{animation:modalIn .24s cubic-bezier(.16,1,.3,1) both}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Revenue mini cards hover */
.ov-rev-card{transition:transform .18s,box-shadow .18s}
.ov-rev-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}

/* Retention / customer cards */
.retention-card{transition:all .2s}
.retention-card:hover{box-shadow:0 4px 18px rgba(26,58,40,.1);border-color:var(--primary-mid)}

/* ── MODAL ACCENT STRIPS ── */
.modal{border-top:4px solid var(--primary)}
#modal-body .modal{border-top:4px solid var(--success)}
#modal-finance .modal{border-top:4px solid var(--accent)}
#modal-coach .modal{border-top:4px solid #2563eb}
#modal-coupon .modal,#modal-renew .modal{border-top:4px solid #7c3aed}

/* ── FIELD HINT BADGES ── */
.fhint{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;margin-top:5px;min-height:20px;transition:all .2s}
.fhint-good{background:var(--good-bg);color:var(--good-text)}
.fhint-warn{background:var(--warn-bg);color:var(--warn-text)}
.fhint-bad{background:var(--bad-bg);color:var(--bad-text)}
.fhint-low{background:var(--low-bg);color:var(--low-text)}

/* ── HEALTH SCORE GAUGE ── */
.hs-card{background:linear-gradient(135deg,#0f2318 0%,#1a3a28 50%,#2d5a3d 100%);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;color:#fff;display:flex;align-items:center;gap:20px;flex-wrap:wrap;box-shadow:0 6px 24px rgba(0,0,0,.2)}
.hs-gauge{flex-shrink:0}
.hs-info{flex:1;min-width:160px}
.hs-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.55);margin-bottom:4px}
.hs-score-big{font-size:32px;font-weight:700;color:#fff;line-height:1}
.hs-grade-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px}
.hs-breakdown{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.hs-metric{font-size:11px;color:rgba(255,255,255,.65)}
.hs-metric span{color:#fff;font-weight:700}
.hs-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.hs-info-panel{display:none;background:rgba(0,0,0,.25);border-radius:8px;padding:12px 14px;margin-top:10px;font-size:12px;color:rgba(255,255,255,.85);line-height:1.7}
.hs-info-panel table{width:100%;border-collapse:collapse}
.hs-info-panel td{padding:3px 8px 3px 0;vertical-align:top;color:rgba(255,255,255,.85)}
.hs-info-panel td:first-child{font-weight:700;color:#fff;white-space:nowrap}
.hs-grade-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.hs-grade-pip{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}

/* ── DIET PLAN ── */
.diet-header{background:linear-gradient(135deg,#052e16,#14532d,#166534);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;color:#fff}
.diet-header h2{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}
.diet-header p{font-size:12px;opacity:.7}
.diet-macros{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.diet-macro{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 14px;text-align:center;flex:1;min-width:70px}
.diet-macro-val{font-size:18px;font-weight:700}
.diet-macro-lbl{font-size:10px;opacity:.7;margin-top:2px}
.meal-slot{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.meal-slot-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.meal-slot-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.meal-slot-title{font-weight:700;font-size:14px}
.meal-slot-cal{font-size:11px;color:var(--muted);margin-top:1px}
.meal-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--surface2)}
.meal-item:last-child{border-bottom:none}
.meal-item-name{font-size:13px;font-weight:600}
.meal-item-detail{font-size:11px;color:var(--muted);margin-top:2px}
.meal-item-badge{background:var(--surface2);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--primary);white-space:nowrap}

/* ── MODAL LIVE SCORE ── */
.modal-hs-bar{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.modal-hs-ring{flex-shrink:0}
.modal-hs-label{font-size:12px;color:var(--muted);font-weight:600}
.modal-hs-val{font-size:20px;font-weight:700;color:var(--primary)}

/* ── SIDEBAR GREETING ── */
.sb-greeting{padding:12px 18px 2px;font-size:10.5px;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.sb-greeting-name{color:rgba(255,255,255,.85);font-size:13px;font-weight:700;margin-top:2px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── WELLNESS SCAN ANALYST ── */
.ws-tab-btn {
  background: none;
  border: none;
  padding: 10px 18px;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s ease;
}
.ws-tab-btn:hover:not(:disabled) {
  color: var(--primary);
}
.ws-tab-btn.active {
  color: var(--primary);
  border-bottom: 2px solid var(--primary);
}
.ws-tab-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.ws-badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11.5px;
  font-weight: 700;
  text-transform: uppercase;
}
.ws-badge.low_protein { background: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
.ws-badge.breakfast_replacement { background: #fffbeb; color: #d97706; border: 1px solid #fef3c7; }
.ws-badge.calorie_deficit { background: #f0fdf4; color: #16a34a; border: 1px solid #dcfce7; }
.ws-badge.digestive_soothing { background: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }
.ws-badge.hydration_boost { background: #eff6ff; color: #2563eb; border: 1px solid #dbeafe; }
.ws-badge.cellular_energy { background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; }

.ws-copy-btn {
  background: var(--surface);
  border: 1px solid var(--border-solid);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 12.5px;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.2s ease;
  position: relative;
  line-height: 1.4;
}
.ws-copy-btn:hover {
  background: var(--hover-bg);
  border-color: var(--primary-light);
}
.ws-copy-btn::after {
  content: '📋 Click to copy';
  position: absolute;
  right: 10px;
  bottom: 6px;
  font-size: 10px;
  color: var(--muted);
  opacity: 0.6;
}

/* ── MEDIA — mobile sidebar ── */

/* ─────────────────── PREMIUM CYBER-NEON GLASSMORPHIC OVERRIDES ─────────────────── */
body, input, select, textarea, button {
  font-family: 'Plus Jakarta Sans', sans-serif;

      <div class="tcard" style="padding:26px">
        <p style="margin-bottom:6px;color:var(--muted);font-size:13px">Copy all the SQL below → paste in Supabase SQL Editor → click Run</p>
        <p style="margin-bottom:14px;padding:10px 14px;background:#fff3cd;border-left:4px solid #e8a838;border-radius:6px;font-size:12px;color:#7a5a00"><strong>⚠️ Security Note:</strong> The RLS policies below use <code>using (true)</code> which allows public access — suitable for single-owner use with a private API key. For multi-user or production deployments, replace with <code>using (auth.uid() is not null)</code> or a stricter role-based policy.</p>
        <pre class="sqlbox">create table if not exists wellness_centers (
  id uuid default gen_random_uuid() primary key,
  name text not null, location text, contact text,
  type text default 'branch',
  created_at timestamptz default now()
);
alter table wellness_centers enable row level security;
create policy "allow all" on wellness_centers for all using (true);

create table if not exists customers (
  id uuid default gen_random_uuid() primary key,
  name text not null, contact text, pack_type text,
  pack_start_date date, pack_end_date date,
  wellness_center_id uuid,
  created_at timestamptz default now()
);
alter table customers enable row level security;
create policy "allow all" on customers for all using (true);

create table if not exists attendance (
  id uuid default gen_random_uuid() primary key,
  customer_id uuid, customer_name text,
  date date not null default current_date,
  status text default 'present', notes text,
  created_at timestamptz default now()
);
alter table attendance enable row level security;
create policy "allow all" on attendance for all using (true);

create table if not exists body_composition (
  id uuid default gen_random_uuid() primary key,
  customer_id uuid, customer_name text,
  date date not null default current_date,
  weight numeric, muscle_mass numeric,
  fat_percentage numeric, bmi numeric, notes text,
  created_at timestamptz default now()
);
alter table body_composition enable row level security;
create policy "allow all" on body_composition for all using (true);

create table if not exists finance (
  id uuid default gen_random_uuid() primary key,
  type text not null, description text,
  amount numeric not null, category text,
  date date not null default current_date,
  created_at timestamptz default now()
);
alter table finance enable row level security;
create policy "allow all" on finance for all using (true);

-- ==========================================
-- 📦 INVENTORY RUNNING BALANCE (Auto-maintained by triggers)
-- ==========================================
create table if not exists inventory_stock_balance (
  product_id text primary key,
  quantity numeric not null default 0,
  unit text,
  last_updated timestamptz default now()
);
alter table inventory_stock_balance enable row level security;
create policy "allow all" on inventory_stock_balance for all using (true);

create or replace function sync_stock_balance() returns trigger as $$
declare delta numeric; pid text; u text;
begin
  if TG_TABLE_NAME = 'inventory_stock_in' then
    if TG_OP = 'INSERT' then pid:=NEW.product_id; u:=NEW.unit; delta:=NEW.quantity;
    elsif TG_OP = 'DELETE' then pid:=OLD.product_id; u:=OLD.unit; delta:=-OLD.quantity;
    elsif TG_OP = 'UPDATE' then pid:=NEW.product_id; u:=NEW.unit; delta:=NEW.quantity-OLD.quantity; end if;
  else
    if TG_OP = 'INSERT' then pid:=NEW.product_id; u:=NEW.unit; delta:=-NEW.quantity;
    elsif TG_OP = 'DELETE' then pid:=OLD.product_id; u:=OLD.unit; delta:=OLD.quantity;
    elsif TG_OP = 'UPDATE' then pid:=NEW.product_id; u:=NEW.unit; delta:=OLD.quantity-NEW.quantity; end if;
  end if;
  insert into inventory_stock_balance(product_id,quantity,unit,last_updated)
    values(pid,delta,u,now())
    on conflict(product_id) do update
    set quantity=inventory_stock_balance.quantity+delta, unit=u, last_updated=now();
  return coalesce(NEW,OLD);
end;
$$ language plpgsql;

drop trigger if exists trg_stock_in on inventory_stock_in;
create trigger trg_stock_in after insert or update or delete on inventory_stock_in
  for each row execute function sync_stock_balance();

drop trigger if exists trg_stock_out on inventory_stock_out;
create trigger trg_stock_out after insert or update or delete on inventory_stock_out
  for each row execute function sync_stock_balance();
