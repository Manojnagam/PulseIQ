<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseZen — Self Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-gradient: radial-gradient(circle at top left, rgba(0, 230, 118, 0.05), transparent 45%), radial-gradient(circle at bottom right, rgba(255, 214, 0, 0.03), transparent 50%), radial-gradient(circle at top right, rgba(255, 23, 68, 0.02), transparent 45%);
  --bg-color: #0b0f19;
  --surface: rgba(18, 26, 44, 0.65);
  --surface-solid: #121a2c;
  --border: rgba(255, 255, 255, 0.07);
  --primary: #00e676;
  --accent: #ffd600;
  --text: #f8fafc;
  --text-muted: #94a3b8;
  --success: #00e676;
  --danger: #ff1744;
  --radius-lg: 24px;
  --radius-md: 16px;
  --shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background-color: #0b0f19;
  background-image: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
}

.kiosk-card {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  width: 100%;
  max-width: 440px;
  box-shadow: var(--shadow);
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.kiosk-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(74, 222, 128, 0.08) 0%, transparent 75%);
  pointer-events: none;
}

.logo-section {
  margin-bottom: 32px;
}

.logo-icon {
  font-size: 44px;
  display: inline-block;
  margin-bottom: 12px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
}

.logo-tagline {
  font-size: 13px;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 700;
  margin-top: 4px;
}

.center-welcome {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 24px;
  color: var(--text);
  line-height: 1.4;
}

.center-welcome span {
  color: var(--primary);
}

.form-group {
  margin-bottom: 24px;
  text-align: left;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.input-wrapper {
  position: relative;
}

.input-wrapper input {
  width: 100%;
  padding: 16px 20px;
  background: rgba(0, 0, 0, 0.2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  color: #fff;
  font-family: inherit;
  font-size: 16px;
  font-weight: 500;
  outline: none;
  transition: all 0.3s;
}

.input-wrapper input:focus {
  border-color: var(--primary);
  background: rgba(0, 0, 0, 0.35);
  box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.15);
}

.btn-submit {
  width: 100%;
  padding: 16px;
  background: var(--primary);
  color: #0d1f14;
  border: none;
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 12px rgba(74, 222, 128, 0.2);
}

.btn-submit:hover {
  background: #22c55e;
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(74, 222, 128, 0.35);
}

.btn-submit:active {
  transform: translateY(0);
}

.profile-btn {
  width: 100%;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  color: #fff;
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.profile-btn:hover {
  background: rgba(255, 255, 255, 0.15);
  border-color: var(--primary);
}

.profile-btn-info {
  display: flex;
  flex-direction: column;
}

.profile-btn-name {
  font-weight: 700;
  font-size: 16px;
}

.profile-btn-role {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.profile-btn-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
}

.profile-btn-badge.coach {
  background: rgba(251, 191, 36, 0.15);
  border: 1px solid rgba(251, 191, 36, 0.3);
  color: var(--accent);
}

.profile-btn-badge.client {
  background: rgba(74, 222, 128, 0.15);
  border: 1px solid rgba(74, 222, 128, 0.3);
  color: var(--primary);
}

.loader {
  display: none;
  border: 3px solid rgba(255, 255, 255, 0.1);
  border-top: 3px solid var(--primary);
  border-radius: 50%;
  width: 24px;
  height: 24px;
  animation: spin 1s linear infinite;
  margin: 10px auto 0;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.msg-box {
  margin-top: 16px;
  padding: 12px;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  display: none;
}

.msg-box.success {
  background: rgba(34, 197, 94, 0.15);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: #4ade80;
}

.msg-box.danger {
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #f87171;
}

/* Success View */
.success-view {
  display: none;
  animation: scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes scaleUp {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.success-icon {
  width: 72px;
  height: 72px;
  background: var(--success);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
  animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

.success-icon svg {
  width: 36px;
  height: 36px;
  fill: none;
  stroke: #fff;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.success-name {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
}

.success-subtitle {
  font-size: 15px;
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 24px;
}

.pack-info {
  background: rgba(0, 0, 0, 0.25);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
}

.pack-title {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.pack-days {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
}

.pack-days span {
  color: var(--accent);
}

.quote-box {
  font-style: italic;
  font-size: 14px;
  color: var(--text-muted);
  border-left: 3px solid var(--primary);
  padding-left: 14px;
  text-align: left;
  margin-top: 16px;
  line-height: 1.5;
}

.footer {
  margin-top: 32px;
  font-size: 11px;
  color: var(--text-muted);
}

.footer a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}

/* Overrides */
h1, h2, h3, h4, h5, h6, .brand-logo {
  font-family: 'Space Grotesk', sans-serif !important;
  font-weight: 700 !important;
  letter-spacing: -0.02em !important;
}

.kiosk-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #00e676, #38bdf8);
  z-index: 2;
  pointer-events: none;
}

input, button, select {
  font-family: 'Plus Jakarta Sans', sans-serif !important;
}

.btn-primary {
  background: linear-gradient(135deg, #00e676 0%, #00b252 100%) !important;
  color: #0b0f19 !important;
  font-family: 'Space Grotesk', sans-serif !important;
  font-weight: 700 !important;
  border: none !important;
  box-shadow: 0 4px 12px rgba(0, 230, 118, 0.2) !important;
}
.btn-primary:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 6px 20px rgba(0, 230, 118, 0.35) !important;
}
</style>
</head>
<body>

<div class="kiosk-card" id="kiosk-container">
  <!-- Check-in Form View -->
  <div id="checkin-view">
    <div class="logo-section">
      <div class="logo-icon">🌿</div>
      <div class="logo-text">PulseZen</div>
      <div class="logo-tagline">Self Check-In</div>
    </div>
    
    <div class="center-welcome" id="welcome-text">
      Welcome! Please enter your phone number to check in today.
    </div>
    
    <form id="checkin-form" onsubmit="handleCheckin(event)">
      <div class="form-group">
        <label for="phone-input">Phone Number</label>
        <div class="input-wrapper">
          <input type="tel" id="phone-input" placeholder="e.g. 9876543210" required autocomplete="tel">
        </div>
      </div>

      <div class="form-group">
        <label for="dob-input">Date of Birth (Security Check)</label>
        <div class="input-wrapper">
          <input type="date" id="dob-input" required>
        </div>
      </div>
      
      <button type="submit" class="btn-submit" id="btn-submit-text">Check In Now</button>
      <div class="loader" id="checkin-loader"></div>
      <div class="msg-box" id="checkin-msg"></div>
    </form>
    
    <div class="footer">
      Powered by <a href="https://pulsezen.in" target="_blank" rel="noopener">PulseZen Wellness</a>
    </div>
  </div>

  <!-- Profile Selection View -->
  <div id="profile-select-view" style="display:none; text-align:left;">
    <div style="font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #fff; text-align:center; font-family:'Playfair Display', serif;">
      Multiple Profiles Found
    </div>
    <p style="font-size:13px; color:var(--text-muted); margin-bottom:24px; text-align:center;">
      Please select your name to complete check-in:
    </p>
    <div id="profile-buttons-container" style="display:grid; gap:12px;">
      <!-- Dynamic Profile Buttons -->
    </div>
    <button class="btn-submit" style="margin-top:24px; background:rgba(255,255,255,0.12); color:#fff; box-shadow:none; border:1px solid rgba(255,255,255,0.15);" onclick="cancelProfileSelection()">Back</button>
  </div>

  <!-- Success View -->
  <div id="success-view" class="success-view">
    <div class="success-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    
    <div class="success-name" id="success-cust-name">Name</div>
    <div class="success-subtitle">Check-in Complete! 🎉</div>
    
    <div class="pack-info">
      <div class="pack-title" id="success-pack-title">Membership Status</div>
      <div class="pack-days" id="success-pack-status">Loading pack info...</div>
    </div>

    <div class="quote-box" id="success-quote">
      "Your health is an investment, not an expense."
    </div>
    
    <button class="btn-submit" style="margin-top:24px; background:rgba(255,255,255,0.15); color:#fff; box-shadow:none" onclick="resetForm()">Done</button>
  </div>
</div>

<script>
// Get query parameters
const params = new URLSearchParams(window.location.search);
const centerId = params.get('center');
const sbUrl = params.get('url');
const sbKey = params.get('key');

// Fallback to defaults if not in query parameters
const SB_URL = sbUrl || 'https://erteibdxzdvsaujptxsd.supabase.co';
const SB_KEY = sbKey || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVydGVpYmR4emR2c2F1anB0eHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MTE5MjMsImV4cCI6MjA5MDE4NzkyM30.Uh6aHjIx1Vukbk49K4oBqtRlxqTd9UiPXVGfDD7M9e0';

const HEALTH_QUOTES = [
  "A healthy outside starts from the inside.",
  "Every workout is a step closer to a stronger version of yourself.",
  "Hydrate, nourish, and move your body today.",
  "Consistency beats perfection. Welcome back today!",
  "Your fitness journey is a marathon, not a sprint.",
  "Eat clean. Drink water. Stay active.",
  "Great things take time. Your daily presence is proof of your commitment!"
];

// Low-level fetch wrapper matching project architecture
async function req(method, table, body, queryParams) {
  const url = SB_URL + '/rest/v1/' + table + (queryParams ? '?' + queryParams : '');
  const opts = {
    method: method,
    headers: { 
      'apikey': SB_KEY, 
      'Authorization': 'Bearer ' + SB_KEY, 
      'Content-Type': 'application/json', 
      'Prefer': 'return=representation' 
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  const text = await r.text();
  return text ? JSON.parse(text) : [];
}

// Set up center name on load
async function loadCenterInfo() {
  if (!centerId) {
    showMsg("Error: Missing wellness center identifier in URL.", "danger");
    document.getElementById('btn-submit-text').disabled = true;
    return;
  }
  try {
    const centers = await req('GET', 'wellness_centers', null, 'id=eq.' + centerId);
    if (centers && centers.length > 0) {
      document.getElementById('welcome-text').innerHTML = `Welcome to <span>${centers[0].name}</span>!<br>Please enter your phone number to check in.`;
    }
  } catch (e) {
    console.error("Failed to load center details", e);
  }
}

function showMsg(text, type) {
  const msg = document.getElementById('checkin-msg');
  msg.textContent = text;
  msg.className = 'msg-box ' + type;
  msg.style.display = 'block';
}

function clearMsg() {
  const msg = document.getElementById('checkin-msg');
  msg.style.display = 'none';
}

// Global matches buffer
let _matchingProfiles = [];

async function handleCheckin(e) {
  e.preventDefault();
  clearMsg();
  
  let phone = document.getElementById('phone-input').value.trim();
  if (!phone) return;
  
  // Clean phone number (remove spaces, symbols)
  phone = phone.replace(/[^0-9]/g, '');
  if (phone.length < 5) {
    showMsg("Please enter a valid phone number.", "danger");
    return;
  }

  const loader = document.getElementById('checkin-loader');
  const submitText = document.getElementById('btn-submit-text');
  loader.style.display = 'block';
  submitText.style.display = 'none';

  try {
    // 1. Fetch ALL clients & coaches for this center
    const [dbCustomers, dbCoaches] = await Promise.all([
      req('GET', 'customers', null, `wellness_center_id=eq.${centerId}`),
      req('GET', 'coaches', null, `wellness_center_id=eq.${centerId}`)
    ]);
    
    // 2. Perform client-side matching to cover multiple country codes/formats
    const matchedClients = dbCustomers.filter(c => {
      const dbPhone = c.phone || c.contact;
      if (!dbPhone) return false;
      const cleanDbPhone = dbPhone.replace(/[^0-9]/g, '');
      return cleanDbPhone.endsWith(phone) || phone.endsWith(cleanDbPhone);
    });

    const matchedCoaches = dbCoaches.filter(c => {
      const dbPhone = c.phone || c.contact;
      if (!dbPhone) return false;
      const cleanDbPhone = dbPhone.replace(/[^0-9]/g, '');
      return cleanDbPhone.endsWith(phone) || phone.endsWith(cleanDbPhone);
    });

    // Merge matching profiles
    _matchingProfiles = [];
    matchedClients.forEach(c => _matchingProfiles.push({ type: 'client', data: c }));
    matchedCoaches.forEach(c => _matchingProfiles.push({ type: 'coach', data: c }));

    if (_matchingProfiles.length === 0) {
      showMsg("Phone number not found. Please verify with your coach.", "danger");
      loader.style.display = 'none';
      submitText.style.display = 'block';
      return;
    }

    // 3. Filter matched profiles by DOB (confidential security check)
    const dobInput = document.getElementById('dob-input').value; // YYYY-MM-DD
    const finalMatched = _matchingProfiles.filter(profile => {
      const dbDob = profile.data.dob;
      if (!dbDob) return true; // Allow legacy profiles without DOB
      return dbDob === dobInput;
    });

    if (finalMatched.length === 0) {
      showMsg("Incorrect Date of Birth. Please verify with your coach.", "danger");
      loader.style.display = 'none';
      submitText.style.display = 'block';
      return;
    }

    if (finalMatched.length === 1) {
      // Direct check-in
      await executeProfileCheckin(finalMatched[0]);
    } else {
      // Show profile selection screen
      _matchingProfiles = finalMatched;
      showProfileSelection();
    }

  } catch (error) {
    console.error("Check-in error:", error);
    showMsg("Unable to check in. Please check your connection and try again.", "danger");
  } finally {
    loader.style.display = 'none';
    submitText.style.display = 'block';
  }
}

function showProfileSelection() {
  const container = document.getElementById('profile-buttons-container');
  container.innerHTML = '';
  
  _matchingProfiles.forEach((profile, index) => {
    const btn = document.createElement('button');
    btn.className = 'profile-btn';
    
    const info = document.createElement('div');
    info.className = 'profile-btn-info';
    
    const name = document.createElement('span');
    name.className = 'profile-btn-name';
    name.textContent = profile.data.name;
    
    const role = document.createElement('span');
    role.className = 'profile-btn-role';
    if (profile.type === 'coach') {
      role.textContent = profile.data.role ? 'Coach · ' + profile.data.role : 'Wellness Coach';
    } else {
      const status = (profile.data.status || 'Active').toLowerCase();
      role.textContent = status === 'active' ? 'Active Member' : 'Inactive Member';
    }
    
    info.appendChild(name);
    info.appendChild(role);
    
    const badge = document.createElement('span');
    badge.className = 'profile-btn-badge ' + profile.type;
    badge.textContent = profile.type;
    
    btn.appendChild(info);
    btn.appendChild(badge);
    
    btn.onclick = () => selectProfile(index);
    container.appendChild(btn);
  });
  
  document.getElementById('checkin-view').style.display = 'none';
  document.getElementById('profile-select-view').style.display = 'block';
}

function cancelProfileSelection() {
  document.getElementById('checkin-view').style.display = 'block';
  document.getElementById('profile-select-view').style.display = 'none';
}

async function selectProfile(index) {
  const profile = _matchingProfiles[index];
  
  const selectView = document.getElementById('profile-select-view');
  // Temporary loading state
  selectView.style.pointerEvents = 'none';
  selectView.style.opacity = '0.6';
  
  try {
    await executeProfileCheckin(profile);
  } catch(e) {
    showMsg("Failed to check in profile.", "danger");
    cancelProfileSelection();
  } finally {
    selectView.style.pointerEvents = 'all';
    selectView.style.opacity = '1';
  }
}

async function executeProfileCheckin(profile) {
  const todayStr = new Date().toISOString().split('T')[0];
  
  if (profile.type === 'client') {
    const cust = profile.data;
    const status = (cust.status || 'Active').toLowerCase();
    if (status !== 'active') {
      showMsg("Your membership is currently inactive. Please talk to your coach.", "danger");
      cancelProfileSelection();
      return;
    }

    // Check duplicate check-in today based on shake frequency
    const todayAtt = await req('GET', 'attendance', null, `customer_id=eq.${cust.id}&date=eq.${todayStr}`);
    const maxAllowedShakes = cust.shake_frequency === 'twice' ? 2 : 1;
    if (todayAtt && todayAtt.length >= maxAllowedShakes) {
      showSuccess(cust, 'client', true);
      return;
    }

    // Determine device & browser fingerprint as check-in proof
    const deviceType = /Mobi|Android|iPhone/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop';
    let browserName = 'Browser';
    const ua = navigator.userAgent;
    if (ua.includes("Chrome")) browserName = "Chrome";
    else if (ua.includes("Safari") && !ua.includes("Chrome")) browserName = "Safari";
    else if (ua.includes("Firefox")) browserName = "Firefox";
    else if (ua.includes("Edge")) browserName = "Edge";
    
    const checkInTime = new Date().toTimeString().slice(0, 5);
    const qrNotes = `Self check-in via QR (${deviceType}/${browserName})`;

    // Mark attendance
    await req('POST', 'attendance', {
      customer_id: cust.id,
      customer_name: cust.name,
      date: todayStr,
      status: 'present',
      servings: 1,
      check_in_time: checkInTime,
      notes: qrNotes
    });
    
    showSuccess(cust, 'client', false);

  } else if (profile.type === 'coach') {
    const coach = profile.data;
    
    // Check duplicate coach check-in today
    const todayAtt = await req('GET', 'coach_attendance', null, `coach_id=eq.${coach.id}&date=eq.${todayStr}`);
    if (todayAtt && todayAtt.length > 0) {
      showSuccess(coach, 'coach', true);
      return;
    }

    // Mark coach attendance
    await req('POST', 'coach_attendance', {
      coach_id: coach.id,
      date: todayStr,
      status: 'present',
      wellness_center_id: centerId
    });
    
    showSuccess(coach, 'coach', false);
  }
}

// Calculate days remaining on membership pack
function calculateDaysRemaining(cust) {
  if (!cust.join_date || !cust.pack_days) return "No active pack";
  
  const joinDate = new Date(cust.join_date);
  const expiryDate = new Date(joinDate.getTime() + cust.pack_days * 24 * 60 * 60 * 1000);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  const diffTime = expiryDate - today;
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  
  if (diffDays < 0) return "Expired pack ⚠️";
  return `<span>${diffDays}</span> days remaining`;
}

function showSuccess(entity, type, alreadyCheckedIn) {
  document.getElementById('success-cust-name').textContent = entity.name;
  
  if (type === 'coach') {
    document.getElementById('success-pack-title').textContent = "Profile Status";
    document.getElementById('success-pack-status').innerHTML = `Verified Coach 👨‍🏫<div style="font-size:12px;color:var(--text-muted);margin-top:4px">${entity.role || 'Wellness Lead'}</div>`;
    document.getElementById('success-quote').textContent = `"A coach is someone who tells you what you don't want to hear, so you can be who you've always known you could be."`;
  } else {
    document.getElementById('success-pack-title').textContent = "Membership Status";
    const packDaysText = calculateDaysRemaining(entity);
    document.getElementById('success-pack-status').innerHTML = packDaysText;
    
    // Add warning for missing DOB on success view
    if (!entity.dob) {
      document.getElementById('success-pack-status').innerHTML += `<div style="font-size:11px;color:var(--accent);margin-top:8px;font-weight:600">⚠️ Secure your profile: Ask your coach to add your Date of Birth.</div>`;
    }
    
    const randomQuote = HEALTH_QUOTES[Math.floor(Math.random() * HEALTH_QUOTES.length)];
    document.getElementById('success-quote').textContent = `"${randomQuote}"`;
  }
  
  if (alreadyCheckedIn) {
    const frequencyText = entity.shake_frequency === 'twice' ? 'twice' : 'today';
    document.querySelector('.success-subtitle').textContent = `Already checked in ${frequencyText}! 👍`;
  } else {
    document.querySelector('.success-subtitle').textContent = "Check-in Complete! 🎉";
  }

  // Toggle views
  document.getElementById('checkin-view').style.display = 'none';
  document.getElementById('profile-select-view').style.display = 'none';
  document.getElementById('success-view').style.display = 'block';
}

function resetForm() {
  document.getElementById('phone-input').value = '';
  document.getElementById('dob-input').value = '';
  clearMsg();
  document.getElementById('checkin-view').style.display = 'block';
  document.getElementById('profile-select-view').style.display = 'none';
  document.getElementById('success-view').style.display = 'none';
}

// Run on load
loadCenterInfo();
